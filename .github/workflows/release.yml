name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Set version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_beta=$([[ "$VERSION" == *-beta* ]] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          node -e "
          const fs = require('fs');
          const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          p.version = '${{ steps.version.outputs.version }}';
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish to npm
        run: |
          if [ "${{ steps.version.outputs.is_beta }}" = "true" ]; then
            pnpm publish --no-git-checks --tag beta
          else
            pnpm publish --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        run: |
          node -e "
          const fs = require('fs');
          const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          p.name = '@0xbadcoffee/censorkit';
          p.publishConfig = { registry: 'https://npm.pkg.github.com' };
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          echo "@0xbadcoffee:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          if [ "${{ steps.version.outputs.is_beta }}" = "true" ]; then
            pnpm publish --no-git-checks --tag beta
          else
            pnpm publish --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release asset
        run: zip -r censorkit-dist.zip dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: censorkit-dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
