name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Set version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *-beta* ]]; then
            echo "is_beta=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update package.json version
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '${{ steps.version.outputs.version }}';
          pkg.name = 'censorkit';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # IMPORTANT DEBUG STEP
      - name: Verify npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Registry:"
          npm config get registry

          echo ""
          echo "Current npm user:"
          npm whoami

          echo ""
          echo "Package owner info:"
          npm owner ls censorkit || true

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ steps.version.outputs.is_beta }}" = "true" ]; then
            pnpm publish --no-git-checks --tag beta
          else
            pnpm publish --no-git-checks
          fi

      - name: Prepare GitHub Packages package.json
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));

          pkg.name = '@0xbadcoffee/censorkit';
          pkg.publishConfig = {
            registry: 'https://npm.pkg.github.com'
          };

          fs.writeFileSync(
            'package.json',
            JSON.stringify(pkg, null, 2) + '\n'
          );
          "

      - name: Publish to GitHub Packages
        run: |
          echo "@0xbadcoffee:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

          if [ "${{ steps.version.outputs.is_beta }}" = "true" ]; then
            pnpm publish --no-git-checks --tag beta
          else
            pnpm publish --no-git-checks
          fi

      - name: Create release asset
        run: |
          zip -r censorkit-dist.zip dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: censorkit-dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
